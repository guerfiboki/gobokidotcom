version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: goboki_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: goboki
      POSTGRES_USER: goboki_user
      POSTGRES_PASSWORD: goboki_secret
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U goboki_user -d goboki']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goboki_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: goboki_mail
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
